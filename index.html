<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Booker">
  <title>Kallang Booker</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.svg">
  <style>
    :root {
      --bg:       #0a1628;
      --surface:  #111f38;
      --border:   #1e3255;
      --green:    #1D9E75;
      --green-dk: #0F6E56;
      --green-lt: #9FE1CB;
      --green-bg: #0b2a20;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --mono:     'JetBrains Mono', 'Fira Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: calc(env(safe-area-inset-top, 0px) + 20px) 16px calc(env(safe-area-inset-bottom, 0px) + 28px);
      max-width: 480px;
      margin: 0 auto;
    }

    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
    .header-icon { font-size: 30px; line-height: 1; }
    .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
      color: var(--text); font-size: 15px; font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--green); }
    .field textarea { font-family: var(--mono); font-size: 11px; min-height: 76px; resize: none; line-height: 1.6; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .opens-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 12px; font-family: var(--mono); color: var(--green-lt); margin-top: 10px;
    }
    .opens-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    .btn-primary {
      width: 100%; padding: 15px; background: var(--green); color: white;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
      -webkit-appearance: none; letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:active { background: var(--green-dk); transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-secondary {
      width: 100%; padding: 13px; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 12px; font-size: 14px;
      cursor: pointer; margin-top: 8px; -webkit-appearance: none;
    }
    .btn-secondary:active { border-color: var(--red); color: var(--red); }

    /* Run screen */
    #run-screen { display: none; }
    #run-screen.show { display: block; }
    #setup-screen.hidden { display: none; }

    .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .badge-armed   { background: #2a1f06; color: var(--amber); }
    .badge-armed   .badge-dot { background: var(--amber); animation: pulse 1.4s infinite; }
    .badge-running { background: var(--green-bg); color: var(--green-lt); }
    .badge-running .badge-dot { background: var(--green-lt); animation: pulse 0.7s infinite; }
    .badge-booked  { background: var(--green-bg); color: var(--green-lt); }
    .badge-booked  .badge-dot { background: var(--green-lt); }
    .badge-failed  { background: #2a0a0a; color: var(--red); }
    .badge-failed  .badge-dot { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .countdown-block {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px; text-align: center; margin-bottom: 12px;
    }
    .countdown-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .countdown-time { font-family: var(--mono); font-size: 38px; font-weight: 700; color: var(--text); letter-spacing: 3px; line-height: 1; }
    .countdown-time.imminent { color: var(--amber); }
    .countdown-sub { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: var(--mono); }

    .pool-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .pool-pip { flex: 1; height: 5px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
    .pool-pip.ready  { background: var(--green); }
    .pool-pip.firing { background: var(--amber); animation: pulse 0.5s infinite; }
    .pool-pip.dead   { background: var(--red); }

    .log-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .log-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .log-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .log-clear { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; }
    #log { padding: 10px 12px; font-family: var(--mono); font-size: 11px; line-height: 1.8; max-height: 200px; overflow-y: auto; color: #94a3b8; }

    .booked-banner { background: var(--green-bg); border: 1px solid var(--green); border-radius: 14px; padding: 22px; text-align: center; margin-bottom: 12px; display: none; }
    .booked-banner.show { display: block; }
    .booked-banner .big { font-size: 38px; margin-bottom: 8px; }
    .booked-banner .title { font-size: 18px; font-weight: 700; color: var(--green-lt); margin-bottom: 4px; }
    .booked-banner .sub { font-size: 13px; color: var(--muted); }
    .btn-payment { display: block; width: 100%; margin-top: 14px; padding: 13px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; -webkit-appearance: none; }

    /* Script output */
    .script-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; font-family: var(--mono); font-size: 10px; color: var(--green-lt);
      line-height: 1.5; word-break: break-all; max-height: 120px; overflow-y: auto;
      margin-bottom: 10px; user-select: all;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🏸</div>
    <div>
      <div class="header-title">Kallang Booker</div>
      <div class="header-sub">Auto-book badminton courts</div>
    </div>
  </div>

  <!-- Setup screen -->
  <div id="setup-screen">
    <div class="card">
      <div class="card-label">Target Slot</div>
      <div class="grid2">
        <div class="field">
          <label>Date</label>
          <input type="date" id="date" oninput="updateOpens()">
        </div>
        <div class="field">
          <label>Time</label>
          <input type="time" id="time" value="07:00" oninput="updateOpens()">
        </div>
      </div>
      <div class="opens-pill">
        <span class="dot"></span>
        <span id="opens-text">Select date and time</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Account</div>
      <div class="grid2">
        <div class="field">
          <label>User ID</label>
          <input type="number" id="userId" value="62061" inputmode="numeric">
        </div>
        <div class="field">
          <label>Rule ID</label>
          <input type="number" id="ruleId" value="19" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>Duration (min)</label>
        <select id="duration">
          <option value="60">60 minutes</option>
          <option value="90">90 minutes</option>
          <option value="120">120 minutes</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Bearer Token</div>
      <div class="field">
        <label>JWT — no "Bearer " prefix</label>
        <textarea id="token" placeholder="eyJhbGci..." autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
      </div>
    </div>

    <button class="btn-primary" id="generate-btn" onclick="generate()">Generate &amp; Copy Script</button>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px;">
      Then open <strong style="color:var(--text)">thekallang.perfectgym.com</strong>, open DevTools console, paste &amp; run.
    </p>
  </div>

  <!-- Run screen (script ready) -->
  <div id="run-screen">
    <div class="card">
      <div class="card-label">Script ready</div>
      <div class="script-box" id="script-preview"></div>
      <button class="btn-primary" id="copy-btn" onclick="copyScript()">Copy Script</button>
      <a id="open-btn" class="btn-payment" style="margin-top:8px"
         href="https://thekallang.perfectgym.com/clientportal2/#/FacilityBooking"
         target="_blank" rel="noopener">Open Kallang →</a>
      <button class="btn-secondary" onclick="reset()">← Back</button>
    </div>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:4px;">
      Paste into the browser console on the Kallang tab. Keep the tab open.
    </p>
  </div>

  <script>
  (function () {
    'use strict';

    let generatedScript = '';

    function updateOpens() {
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const el   = document.getElementById('opens-text');
      if (!date || !time) { el.textContent = 'Select date and time'; return; }
      const openMs = new Date(date + 'T' + time + ':00').getTime() - 168 * 3600000;
      el.textContent = 'Opens: ' + new Date(openMs).toLocaleString('en-SG', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    function generate() {
      const date     = document.getElementById('date').value;
      const time     = document.getElementById('time').value;
      const userId   = document.getElementById('userId').value;
      const ruleId   = document.getElementById('ruleId').value;
      const duration = document.getElementById('duration').value;
      const token    = document.getElementById('token').value.trim();

      if (!date || !time || !token) { alert('Fill in date, time, and token'); return; }

      ['date','time','userId','ruleId','duration','token'].forEach(id => {
        localStorage.setItem('kb_' + id, document.getElementById(id).value);
      });

      const startTime = date + 'T' + time + ':00';
      const openMs    = new Date(startTime).getTime() - 168 * 3600000;
      const tokenStr  = JSON.stringify(token);

      generatedScript = `(async function() {
  const OPEN_AT_MS        = ${openMs};
  const START_TIME        = ${JSON.stringify(startTime)};
  const SLOT_DATE         = ${JSON.stringify(date)};
  const USER_ID           = ${userId};
  const RULE_ID           = ${ruleId};
  const DURATION          = ${duration};
  const TOKEN             = ${tokenStr};
  const BASE              = "https://thekallang.perfectgym.com/clientportal2";
  const CLUB_ID           = 1;
  const ZONE_TYPE         = 31;
  const RETRY_DURATION_MS = 30 * 1000;
  const PARALLEL_SHOTS    = 12;
  const POOL_SIZE         = 3;
  const PREFIRE_MS        = 100;
  const KEEPALIVE_MS      = 25000;
  let sessionPool = [], booked = false, keepaliveTimer = null;

  function pad(n) { return String(Math.floor(n)).padStart(2,"0"); }

  function getOpenDate() {
    const d = new Date(OPEN_AT_MS);
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }

  async function buildSession() {
    try {
      const url = BASE + "/FacilityBookings/BuyProductBeforeBookingFacility/Start?clubId=" + CLUB_ID +
        "&zoneTypeId=" + ZONE_TYPE + "&date=" + getOpenDate() + "&startDate=" + START_TIME;
      const r1 = await fetch(url, { credentials: "include", headers: {
        "Accept": "application/json, text/plain, */*", "Authorization": "Bearer " + TOKEN,
        "X-Requested-With": "XMLHttpRequest", "CP-LANG": "en", "CP-MODE": "desktop"
      }});
      if (!r1.ok) return null;
      const sid = r1.headers.get("cp-buy-product-before-booking-fb-session-id");
      if (!sid) return null;
      const data = await r1.json();
      let zones = (data.Data && data.Data.Zones) ? data.Data.Zones : [];
      if (!zones.length) return null;
      zones.sort((a, b) => (parseInt((b.Name.match(/\\d+$/) || [0])[0]) || 0) - (parseInt((a.Name.match(/\\d+$/) || [0])[0]) || 0));
      const zoneId = zones[0].Id;
      const hdrs = {
        "Content-Type": "application/json;charset=utf-8", "Accept": "application/json, text/plain, */*",
        "Authorization": "Bearer " + TOKEN,
        "X-Hash": "#/FacilityBooking?clubId=" + CLUB_ID + "&zoneTypeId=" + ZONE_TYPE + "&date=" + SLOT_DATE,
        "BAF-WIZARD-CURRENTURL": BASE + "/#/FacilityBooking?clubId=" + CLUB_ID + "&zoneTypeId=" + ZONE_TYPE + "&date=" + SLOT_DATE + "&sessionId=" + sid,
        "CP-BUY-PRODUCT-BEFORE-BOOKING-FB-SESSION-ID": sid,
        "X-Requested-With": "XMLHttpRequest", "CP-LANG": "en", "CP-MODE": "desktop"
      };
      const r2 = await fetch(BASE + "/FacilityBookings/WizardSteps/SetFacilityBookingDetailsWizardStep/Next", {
        method: "POST", credentials: "include", headers: hdrs,
        body: JSON.stringify({ UserId: USER_ID, ZoneId: zoneId, StartTime: START_TIME, RequiredNumberOfSlots: null, Duration: DURATION })
      });
      if (!r2.ok) return null;
      return { sessionId: sid, zoneId, zones };
    } catch(_) { return null; }
  }

  async function refreshPool() {
    const results = await Promise.all(Array.from({ length: POOL_SIZE }, () => buildSession()));
    sessionPool = results.filter(Boolean);
    console.log("   Pool: " + sessionPool.length + "/" + POOL_SIZE + " sessions ready" +
      (sessionPool.length ? " ✓ courts: " + sessionPool[0].zones.map(z => z.Name).join(", ") : " ✗"));
  }

  async function tryStep3(sess) {
    const hdrs = {
      "Content-Type": "application/json;charset=utf-8", "Accept": "application/json, text/plain, */*",
      "Authorization": "Bearer " + TOKEN,
      "X-Hash": "#/FacilityBooking?clubId=" + CLUB_ID + "&zoneTypeId=" + ZONE_TYPE + "&date=" + SLOT_DATE,
      "BAF-WIZARD-CURRENTURL": BASE + "/#/FacilityBooking?clubId=" + CLUB_ID + "&zoneTypeId=" + ZONE_TYPE + "&date=" + SLOT_DATE + "&sessionId=" + sess.sessionId,
      "CP-BUY-PRODUCT-BEFORE-BOOKING-FB-SESSION-ID": sess.sessionId,
      "X-Requested-With": "XMLHttpRequest", "CP-LANG": "en", "CP-MODE": "desktop"
    };
    try {
      const res = await fetch(BASE + "/FacilityBookings/WizardSteps/ChooseBookingRuleStep/Next", {
        method: "POST", credentials: "include", headers: hdrs,
        body: JSON.stringify({ ruleId: RULE_ID, OtherCalendarEventBookedAtRequestedTime: false, HasUserRequiredProducts: false })
      });
      if (!res.ok) return false;
      const d = await res.json();
      booked = true;
      console.log("\\n✅ BOOKED! Court: " + (sess.zones[0] ? sess.zones[0].Name : ""));
      if (d.Redirect) { console.log("📋 Payment: " + d.Redirect); window.location.href = d.Redirect; }
      return true;
    } catch(_) { return false; }
  }

  async function poolSalvo() {
    const all = sessionPool.flatMap(sess => Array.from({ length: PARALLEL_SHOTS }, () => tryStep3(sess)));
    return (await Promise.all(all)).some(Boolean);
  }

  async function fireBlitz() {
    if (keepaliveTimer) { clearInterval(keepaliveTimer); keepaliveTimer = null; }
    console.log("\\n🔥 FIRING — " + sessionPool.length + " sessions × " + PARALLEL_SHOTS +
      " = " + (sessionPool.length * PARALLEL_SHOTS) + " simultaneous requests");
    const deadline = Date.now() + RETRY_DURATION_MS;
    let n = 1;
    while (!booked && Date.now() < deadline) {
      console.log("   🔥 Salvo #" + n);
      if (await poolSalvo()) return;
      n++;
      if (n === 3 && !booked) {
        console.log("   🔄 Refreshing sessions...");
        await refreshPool();
      }
    }
    if (!booked) console.error("\\n❌ No court after 30s.");
  }

  function countdown() {
    const ms = OPEN_AT_MS - Date.now();
    if (ms <= PREFIRE_MS) { fireBlitz(); return; }
    const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
    console.log("⏱  " + pad(h) + "h " + pad(m) + "m " + pad(s) + "s");
    setTimeout(countdown, ms > 300000 ? 30000 : ms > 60000 ? 10000 : ms > 10000 ? 1000 : 100);
  }

  console.log("📅 Target: " + SLOT_DATE + " " + START_TIME.slice(11,16));
  console.log("⚙️  Building " + POOL_SIZE + " sessions in parallel...");
  let ok = false;
  for (let i = 1; i <= 5; i++) {
    await refreshPool();
    if (sessionPool.length) { ok = true; break; }
    console.warn("   Attempt " + i + " failed, retrying in 3s...");
    await new Promise(r => setTimeout(r, 3000));
  }
  if (!ok) { console.error("❌ Setup failed. Check token."); return; }

  const msLeft = OPEN_AT_MS - Date.now();
  if (msLeft <= PREFIRE_MS) {
    console.log("Window already open — booking now");
    await fireBlitz();
  } else {
    const h = Math.floor(msLeft / 3600000), m = Math.floor((msLeft % 3600000) / 60000);
    console.log("🎯 Armed. Opens in " + h + "h " + m + "m. Sessions refresh every 25s. Keep tab open.");
    keepaliveTimer = setInterval(async () => {
      if (booked || (OPEN_AT_MS - Date.now() < 5000)) { clearInterval(keepaliveTimer); return; }
      console.log("⟳  Keepalive: refreshing pool...");
      await refreshPool();
    }, KEEPALIVE_MS);
    countdown();
  }
})();`;

      document.getElementById('script-preview').textContent = generatedScript.slice(0, 300) + '…';
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('run-screen').classList.add('show');
      copyScript();
    }

    function copyScript() {
      if (!generatedScript) return;
      navigator.clipboard.writeText(generatedScript).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✓ Copied!';
        setTimeout(() => { btn.textContent = 'Copy Script'; }, 2000);
      }).catch(() => {
        // Fallback for older WebKit
        const ta = document.createElement('textarea');
        ta.value = generatedScript;
        ta.style.position = 'fixed';
        ta.style.opacity  = '0';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✓ Copied!';
        setTimeout(() => { btn.textContent = 'Copy Script'; }, 2000);
      });
    }

    function reset() {
      generatedScript = '';
      document.getElementById('setup-screen').classList.remove('hidden');
      document.getElementById('run-screen').classList.remove('show');
    }

    // Restore saved values
    window.addEventListener('DOMContentLoaded', () => {
      ['date','time','userId','ruleId','duration','token'].forEach(id => {
        const v = localStorage.getItem('kb_' + id);
        if (v) document.getElementById(id).value = v;
      });
      updateOpens();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    window.updateOpens  = updateOpens;
    window.generate     = generate;
    window.copyScript   = copyScript;
    window.reset        = reset;
  })();
  </script>
</body>
</html>
